// Combat — caster POV, simultaneous turn, grimoire + incantation

const ENEMIES = [
  {id:'e1', name:'Гоблин-вор',  hp:28, maxHp:28, states:['exposed']},
  {id:'e2', name:'Пещерный жнец', hp:55, maxHp:55, states:['shielded']},
];

const ALLIES = [
  {id:'a1', name:'Вы',        role:'Маг',    hp:null, class:'caster'},
  {id:'a2', name:'Торвальд',  role:'Воин',   hp:null, class:'tool'},
  {id:'a3', name:'Льенн',     role:'Алхимик',hp:null, class:'alch'},
];

const COMBAT_SPELLS = [
  {id:'c1', name:'Ignis Parvus', ru:'Малый огонь', school:'fire'},
  {id:'c2', name:'Aqua Scutum',  ru:'Водный щит', school:'water'},
  {id:'c3', name:'Terra Mure',   ru:'Стена земли', school:'earth'},
];

function Combat({onLeave}){
  const [partyHp, setPartyHp] = React.useState(72);
  const [enemyHp, setEnemyHp] = React.useState(83);
  const [partyMax] = React.useState(100);
  const [enemyMax] = React.useState(100);
  const [turn, setTurn] = React.useState(3);
  const [timer, setTimer] = React.useState(42);
  const [base, setBase] = React.useState('c1');
  const [incant, setIncant] = React.useState('Conus Magnus');
  // Target is derived from the spell + circumstances, NOT picked:
  //   - attack spells → the most threatening enemy marked by the party
  //   - defence spells → whoever's in trouble
  //   - utility → environment / situation
  // Player can influence via incantation ("...in scutum Torvaldis").
  const auto = (()=>{
    const spell = COMBAT_SPELLS.find(s=>s.id===base);
    if(!spell) return {kind:'none', label:'—'};
    if(spell.school==='fire' || spell.school==='air') {
      const focus = ENEMIES.find(e=>e.states.includes('exposed')) || ENEMIES[0];
      return {kind:'enemy', label:focus.name, reason:'самый открытый противник'};
    }
    if(spell.school==='water') {
      const ally = ALLIES[0]; // you
      return {kind:'ally', label:ally.name, reason:'ближайший союзник'};
    }
    if(spell.school==='earth') {
      return {kind:'area', label:'стена между отрядом и врагами', reason:'разделить поле боя'};
    }
    return {kind:'self', label:'Вы', reason:'на себя'};
  })();
  const [log, setLog] = React.useState([
    {t:'system', text:'Ход 2. Торвальд бьёт мечом: Жнец оглушён на 1 ход.'},
    {t:'narr',   text:'Пещера пахнет серой. Где-то сзади капает вода — ровно, как метроном.'},
  ]);
  const [resolving, setResolving] = React.useState(false);

  // timer tick
  React.useEffect(()=>{
    const id = setInterval(()=>setTimer(t=> t>0 ? t-1 : 0), 1000);
    return ()=>clearInterval(id);
  },[turn]);

  function submit(){
    setResolving(true);
    setLog(l=>[...l,
      {t:'action', text:`Вы: ${COMBAT_SPELLS.find(s=>s.id===base).name} + «${incant}» → ${auto.label}`},
    ]);
    setTimeout(()=>{
      setLog(l=>[...l,
        {t:'narr', text:'Ваш огонь сворачивается в узкий конус и обжигает жнецу плечо; его щит слетает с щелчком, как отстёгнутая застёжка. Торвальд, не мешкая, режет по открытой спине.'},
        {t:'system', text:'Жнец: burning (3 т), shielded снят. Урон 18.'},
      ]);
      setEnemyHp(h=>Math.max(0, h-18));
      setTurn(t=>t+1);
      setTimer(45);
      setResolving(false);
    }, 1400);
  }

  return (
    <div style={{position:'relative', flex:1, overflow:'hidden', display:'flex', flexDirection:'column'}}>
      <div className="parchment"/>

      <div style={{position:'relative', padding:'8px 12px 4px'}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, marginBottom:4}}>
          <Chip color="wax">Ход {turn}</Chip>
          <div style={{fontFamily:'var(--mono)', fontSize:11, color: timer<15?'var(--wax)':'var(--ink-soft)'}}>
            ⏳ {Math.floor(timer/60)}:{String(timer%60).padStart(2,'0')}
          </div>
          <Chip color="ink">Дуэль · 3v2</Chip>
        </div>
        <HpBars pHp={partyHp} pMax={partyMax} eHp={enemyHp} eMax={enemyMax}/>
      </div>

      {/* Field */}
      <div style={{position:'relative', padding:'4px 12px 0'}}>
        <div style={{
          padding:8, borderRadius:8,
          background:'rgba(60,35,10,0.05)', border:'1px dashed rgba(60,35,10,0.3)',
        }}>
          <div style={{fontFamily:'var(--mono)', fontSize:9, color:'var(--ink-faint)', textTransform:'uppercase', letterSpacing:'.08em', marginBottom:4}}>Противники</div>
          <div style={{display:'flex', gap:6}}>
            {ENEMIES.map(e=>{
              const isFocus = auto.kind==='enemy' && auto.label===e.name;
              return (
                <div key={e.id} style={{
                  flex:1, padding:'6px 8px',
                  background: isFocus ? 'oklch(0.88 0.08 30 / 0.5)':'oklch(0.94 0.03 80)',
                  border:`1px solid ${isFocus?'var(--wax)':'rgba(60,35,10,0.3)'}`,
                  borderRadius:6, position:'relative',
                }}>
                  <div style={{fontFamily:'var(--display)', fontWeight:700, fontSize:12}}>{e.name}</div>
                  <div style={{display:'flex', gap:3, marginTop:3, flexWrap:'wrap'}}>
                    {e.states.map(s=><Chip key={s} color="magic" style={{fontSize:8, padding:'1px 5px'}}>{s}</Chip>)}
                  </div>
                  {isFocus && (
                    <div style={{
                      position:'absolute', top:-6, right:-4,
                      fontFamily:'var(--rune)', fontSize:14, color:'var(--wax)',
                      filter:'drop-shadow(0 0 3px var(--wax-soft))',
                    }}>✦</div>
                  )}
                </div>
              );
            })}
          </div>

          <div style={{fontFamily:'var(--mono)', fontSize:9, color:'var(--ink-faint)', textTransform:'uppercase', letterSpacing:'.08em', margin:'8px 0 4px'}}>Отряд</div>
          <div style={{display:'flex', gap:6}}>
            {ALLIES.map(a=>(
              <div key={a.id} style={{
                flex:1, padding:'5px 7px',
                background:'oklch(0.94 0.03 80)',
                border:`1px solid ${a.id==='a1'?'var(--magic)':'rgba(60,35,10,0.25)'}`,
                borderRadius:6,
              }}>
                <div style={{fontFamily:'var(--display)', fontWeight:700, fontSize:11}}>{a.name}</div>
                <div style={{fontFamily:'var(--mono)', fontSize:9, color:'var(--ink-faint)'}}>{a.role}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Log */}
      <div className="mmgo-scroll" style={{
        position:'relative', flex:1, overflow:'auto', padding:'8px 12px',
        margin:'8px 12px 0', borderRadius:8,
        background:'oklch(0.97 0.015 82)', border:'1px solid rgba(60,35,10,0.25)',
        boxShadow:'inset 0 2px 4px rgba(60,35,10,0.1)',
      }}>
        {log.map((l,i)=>(
          <div key={i} style={{
            fontSize: l.t==='narr'?13:11,
            lineHeight:1.45, marginBottom:6,
            fontFamily: l.t==='narr'?'var(--serif)':'var(--mono)',
            fontStyle: l.t==='narr'?'italic':'normal',
            color: l.t==='system'?'var(--ink-faint)':(l.t==='action'?'var(--magic)':'var(--ink)'),
          }}>
            {l.t==='system'&&'▸ '}{l.t==='action'&&'❯ '}{l.text}
          </div>
        ))}
      </div>

      {/* Caster action panel */}
      <div style={{position:'relative', padding:'10px 12px 12px'}}>
        <div style={{display:'flex', gap:6, marginBottom:6, overflowX:'auto', paddingBottom:2}}>
          {COMBAT_SPELLS.map(s=>(
            <button key={s.id} onClick={()=>setBase(s.id)} style={{
              padding:'6px 10px', flexShrink:0,
              background: base===s.id?`oklch(from var(--s-${s.school}) 0.9 calc(c*.5) h)`:'oklch(0.94 0.03 80)',
              border:`1px solid ${base===s.id?`var(--s-${s.school})`:'rgba(60,35,10,0.3)'}`,
              borderRadius:6, cursor:'pointer', textAlign:'left',
              fontFamily:'var(--display)', fontSize:11, fontWeight:700,
            }}>
              <span style={{fontFamily:'var(--rune)', color:`var(--s-${s.school})`, marginRight:4}}>{SCHOOL_GLYPH[s.school]}</span>
              {s.name}
            </button>
          ))}
        </div>
        <div style={{
          display:'flex', alignItems:'center', gap:6,
          padding:'3px 8px', marginBottom:4,
          background:'rgba(60,35,10,0.05)',
          border:'1px dashed rgba(60,35,10,0.3)',
          borderRadius:6,
          fontFamily:'var(--serif)', fontStyle:'italic', fontSize:11, color:'var(--ink-soft)',
        }}>
          <span style={{fontFamily:'var(--rune)', fontSize:12, color:'var(--wax)'}}>❯</span>
          <span>цель определится сама: <strong style={{color:'var(--ink)', fontStyle:'normal', fontFamily:'var(--display)', fontWeight:700}}>{auto.label}</strong> <span style={{color:'var(--ink-faint)'}}>— {auto.reason}</span></span>
        </div>
        <div style={{
          display:'flex', gap:6, alignItems:'center',
          padding:'4px 4px 4px 10px',
          background:'oklch(0.97 0.015 82)',
          border:'1px solid rgba(60,35,10,0.35)',
          borderRadius:10,
        }}>
          <span style={{fontFamily:'var(--mono)', fontSize:11, color:'var(--magic)'}}>✦</span>
          <input value={incant} onChange={e=>setIncant(e.target.value)}
            placeholder="Latin incantation…"
            style={{
              flex:1, border:'none', background:'transparent', outline:'none',
              fontFamily:'var(--mono)', fontSize:13, color:'var(--ink)',
            }}/>
          <button className="inkbtn primary" onClick={submit} disabled={resolving || !incant.trim()}
            style={{padding:'6px 12px', fontSize:12}}>
            {resolving?'…':'Произнести'}
          </button>
        </div>
        <div style={{display:'flex', gap:6, marginTop:6, justifyContent:'center'}}>
          <button className="inkbtn ghost" style={{padding:'4px 10px', fontSize:10}}>Готовый план</button>
          <button className="inkbtn ghost" style={{padding:'4px 10px', fontSize:10}}>Пропустить</button>
          <button className="inkbtn ghost" style={{padding:'4px 10px', fontSize:10}} onClick={onLeave}>Бежать</button>
        </div>
      </div>
    </div>
  );
}

function HpBars({pHp, pMax, eHp, eMax}){
  return (
    <div style={{display:'flex', flexDirection:'column', gap:4, fontFamily:'var(--mono)', fontSize:10}}>

// Dungeon — top-down tile/room map. Visually a hand-inked dungeon plan on parchment.
// Same visual language as world map, but smaller scale, room-based, with a fog of war.

const ROOMS = [
  // x,y in % of viewport. type: entrance | room | shrine | treasure | boss
  {id:'r0', x:50, y:88, type:'entrance', label:'Вход'},
  {id:'r1', x:50, y:72, type:'room',     label:'Передняя'},
  {id:'r2', x:30, y:60, type:'room',     label:'Кладовая'},
  {id:'r3', x:70, y:60, type:'shrine',   label:'Алтарь'},
  {id:'r4', x:50, y:48, type:'room',     label:'Перекрёсток'},
  {id:'r5', x:22, y:34, type:'treasure', label:'Сундук'},
  {id:'r6', x:78, y:32, type:'room',     label:'Колодец'},
  {id:'r7', x:50, y:22, type:'boss',     label:'Зал Стража'},
];

const CORRIDORS = [
  ['r0','r1'], ['r1','r2'], ['r1','r3'], ['r1','r4'],
  ['r4','r5'], ['r4','r6'], ['r4','r7'],
];

function Dungeon({onLeave, onCombat}){
  const [pos, setPos] = React.useState('r0');
  const [seen, setSeen] = React.useState(new Set(['r0','r1']));

  function move(roomId){
    if(roomId===pos) return;
    // only allow if connected
    const ok = CORRIDORS.some(([a,b])=> (a===pos && b===roomId)||(b===pos && a===roomId));
    if(!ok) return;
    setPos(roomId);
    setSeen(s => new Set([...s, roomId]));
  }

  const here = ROOMS.find(r=>r.id===pos);

  return (
    <div style={{position:'relative', flex:1, overflow:'hidden', display:'flex', flexDirection:'column'}}>
      {/* Dungeon parchment background — darker, water-stained */}
      <div style={{
        position:'absolute', inset:0,
        background:`
          radial-gradient(ellipse at 30% 20%, oklch(0.62 0.06 60 / 0.6), transparent 40%),
          radial-gradient(ellipse at 70% 80%, oklch(0.55 0.08 35 / 0.5), transparent 50%),
          linear-gradient(180deg, oklch(0.74 0.05 65), oklch(0.66 0.06 60))
        `,
      }}/>
      <div className="parchment" style={{opacity:0.7}}/>

      {/* The dungeon plan itself */}
      <div style={{position:'relative', flex:1, overflow:'hidden'}}>
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{
          position:'absolute', inset:0, width:'100%', height:'100%',
        }}>
          {/* Corridors */}
          {CORRIDORS.map(([a,b],i)=>{
            const ra = ROOMS.find(r=>r.id===a);
            const rb = ROOMS.find(r=>r.id===b);
            const known = seen.has(a) && seen.has(b);
            return (
              <line key={i}
                x1={ra.x} y1={ra.y} x2={rb.x} y2={rb.y}
                stroke={known?'oklch(0.30 0.04 40)':'rgba(60,35,10,0.18)'}
                strokeWidth="0.7"
                strokeDasharray={known?'':'1.5 1.2'}
                vectorEffect="non-scaling-stroke"
              />
            );
          })}
        </svg>

        {/* Rooms */}
        {ROOMS.map(r=>{
          const isHere = r.id===pos;
          const known = seen.has(r.id);
          const reachable = CORRIDORS.some(([a,b])=> (a===pos && b===r.id)||(b===pos && a===r.id));
          if(!known && !reachable) return null;
          return (
            <button key={r.id}
              onClick={()=>move(r.id)}
              disabled={!reachable && !isHere}
              style={{
                position:'absolute', left:`${r.x}%`, top:`${r.y}%`,
                transform:'translate(-50%,-50%)',
                width:42, height:32, padding:0,
                background:'transparent', border:'none', cursor:reachable?'pointer':'default',
              }}>
              <RoomGlyph type={r.type} state={isHere?'here':known?'seen':'reachable'}/>
              {(known || isHere) && (
                <div style={{
                  position:'absolute', top:'100%', left:'50%', transform:'translateX(-50%)',
                  fontFamily:'var(--display)', fontSize:9, fontWeight:600,
                  color: isHere ? 'var(--wax)' : 'var(--ink)',
                  textShadow:'0 0 3px rgba(245,234,211,0.9)',
                  whiteSpace:'nowrap', marginTop:2,
                  pointerEvents:'none',
                }}>{r.label}</div>
              )}
            </button>
          );
        })}

        {/* Compass / scale ornament — bottom corner */}
        <div style={{
          position:'absolute', bottom:8, left:8,
          fontFamily:'var(--rune)', fontSize:10, color:'var(--ink-soft)',
          opacity:0.7,
        }}>
          ◬ Подземелье Башни — ярус I
        </div>
      </div>

      {/* Bottom panel — current room + actions */}
      <div style={{
        position:'relative',
        borderTop:'1px solid rgba(60,35,10,0.45)',
        background:'var(--vellum)',
        padding:'10px 12px',
      }}>

          )}

          )}

            <button className="inkbtn ghost" onClick={onLeave} style={{flex:1}}>← Выйти из подземелья</button>
          )}
          {here.type!=='entrance' && (
            <button className="inkbtn ghost" onClick={()=>setPos('r0')}>в начало</button>
          )}
        </div>
      </div>
    </div>
  );
}

const ROOM_DESC = {
  entrance: {tag:'вход',     text:'Каменная арка, мхом по углам. Снаружи светит солнце; внутри — холод и эхо.'},
  room:     {tag:'комната',  text:'Пустое помещение. По стенам — следы старого пожара.'},
  shrine:   {tag:'алтарь',   text:'Каменный алтарь. На нём догорает чья-то свеча. Магия здесь сильнее.'},
  treasure: {tag:'сокровищница', text:'Окованный медью сундук. Замок цел, но на петлях — свежие царапины.'},
  boss:     {tag:'опасно',   text:'В дальнем углу что-то крупное переводит дыхание. Воздух гудит низко.'},
};

function RoomGlyph({type, state}){
  // state: here | seen | reachable
  const fill = type==='boss'    ? 'oklch(0.55 0.18 28)'
            : type==='treasure' ? 'oklch(0.65 0.13 80)'
            : type==='shrine'   ? 'oklch(0.55 0.16 295)'
            : type==='entrance' ? 'oklch(0.50 0.10 165)'
            : 'oklch(0.92 0.04 80)';
  const stroke = state==='here' ? 'var(--wax)' : 'var(--ink)';
  const sw = state==='here' ? 1.6 : 0.9;
  const opacity = state==='reachable' ? 0.55 : 1;
  return (
    <svg width="42" height="32" viewBox="-21 -16 42 32" style={{opacity, overflow:'visible'}}>
      {/* shadow */}
      <rect x="-13" y="-9" width="26" height="18" rx="2" fill="rgba(0,0,0,0.3)" transform="translate(1, 1)"/>
      {/* room rect */}
      <rect x="-13" y="-9" width="26" height="18" rx="2" fill={fill} stroke={stroke} strokeWidth={sw}/>
      {type==='boss' && (
        <text x="0" y="3" textAnchor="middle" fontSize="10" fontFamily="var(--rune)" fill="oklch(0.25 0.08 28)" fontWeight="700">⚔</text>
      )}
      {type==='treasure' && (
        <text x="0" y="3" textAnchor="middle" fontSize="10" fontFamily="var(--rune)" fill="oklch(0.30 0.08 60)" fontWeight="700">⛁</text>
      )}
      {type==='shrine' && (
        <text x="0" y="3" textAnchor="middle" fontSize="10" fontFamily="var(--rune)" fill="oklch(0.30 0.10 295)" fontWeight="700">✦</text>
      )}
      {type==='entrance' && (
        <text x="0" y="3" textAnchor="middle" fontSize="10" fontFamily="var(--rune)" fill="oklch(0.25 0.10 165)" fontWeight="700">↟</text>
      )}
      {state==='here' && (
        <circle r="2.5" cx="0" cy="0" fill="var(--wax)" stroke="oklch(0.25 0.10 27)" strokeWidth="0.6" style={{animation:'pulse-magic 1.6s ease-in-out infinite'}}/>
      )}
    </svg>
  );
}

// ═══ app.js ═══
// MMGO — main router + Telegram mini-app shell inside iOS device frame

const { useState, useEffect } = React;

function App(){
  const [screen, setScreen] = useState('map');
  const [currentPoi, setCurrentPoi] = useState(()=> localStorage.getItem('mmgo.poi') || null);
  const [gameTime, setGameTime] = useState({day:14, month:7, year:1247, season:'Лето'});
  const [backendState, setBackendState] = useState(null);
  const [backendPois, setBackendPois] = useState(null);
  const [backendRoads, setBackendRoads] = useState(null);

  // Tweaks — simplified, no edit mode
  const [tweaks, setTweaks] = useState({night: false, grimoireLayout: "shelves"});
  const tweaksOpen = false;

  // Persisted party
  const [party, setParty] = useState(()=> {
    try { return JSON.parse(localStorage.getItem('mmgo.party')||'["torvald","lien"]'); }
    catch(e){ return ['torvald','lien']; }
  });
  useEffect(()=>{ localStorage.setItem('mmgo.party', JSON.stringify(party)); },[party]);

  // Fetch real backend state
  const refreshBackendState = React.useCallback(() => {
    fetch('/api/play/state', { credentials: 'same-origin', headers: { accept: 'application/json' } })
      .then(r => r.json())
      .then(payload => {
        if (payload.ok) {
          window.__GAME_STATE = payload.state;
          setBackendState(payload.state);
          const pois = backendToPOIS(payload.state);
          setBackendPois(pois);
          if (pois) {
            const { paths, adj } = backendToRoads(payload.state, pois);
            setBackendRoads({ paths, adj });
            const currentLoc = payload.state.current_location;
            if (currentLoc && !localStorage.getItem('mmgo.poi')) {
              setCurrentPoi(currentLoc.id);
            }
          }
          if (payload.state.realm) {
            setGameTime({
              day: payload.state.realm.day || 14,
              month: payload.state.realm.month || 7,
              year: payload.state.realm.year || 1247,
              season: payload.state.realm.season || 'Лето',
            });
          }
        }
      })
      .catch(err => console.error('Failed to fetch game state:', err));
  }, []);

  useEffect(() => { refreshBackendState(); }, []);

  const title = {
    map:'Карта княжества',
    location:'Прибытие',
    base:'Хутор',
    spell:'Круг призыва',
    grimoire:'Гримуары',
    combat:'Бой',
    academy:'Академия',
    market:'Рынок',
    tavern:'Таверна',
    dungeon:'Подземелье',
    inventory:'Опись',
  }[screen];

  const subtitle = {
    map:'ручная съёмка · 1247 г.',
    location:'вы здесь',
    base:'ваш дом',
    spell:'Латынь и намерение',
    grimoire:'полки и каталог',
    combat:'одновременные ходы',
    academy:'осенний триместр',
    market:'столица · полдень',
    tavern:'«Три пера»',
    dungeon:'ярус I',
    inventory:'сундук и карманы',
  }[screen];

  function go(s){ setScreen(s); }
  function enterLocation(poiId){
    setCurrentPoi(poiId);
    setScreen('location');
  }

  // Screen content
  let body;
  if(screen==='map')      body = <MapScreen night={tweaks.night} onEnter={enterLocation} gameTime={gameTime} setGameTime={setGameTime}
    backendState={backendState} backendPois={backendPois} backendRoads={backendRoads} backendJourneysPath={window.__API.journeysPath}
    refreshBackend={refreshBackendState} />;
  else if(screen==='location') body = <LocationEvent poiId={currentPoi} onLeave={()=>setScreen('map')} onGo={(k)=>{
      if(k==='base')        setScreen('base');
      else if(k==='dungeon') setScreen('dungeon');
      else if(k==='party' || k==='tavern') setScreen('tavern');
      else if(k==='market') setScreen('market');
      else if(k==='academy') setScreen('academy');
      else if(k==='library') setScreen('grimoire');
      else if(k==='letter')  setScreen('base'); // placeholder
      else setScreen('base');
    }}/>;
  else if(screen==='base')    body = <Base onGo={go} onLeave={()=>setScreen('location')}/>;
  else if(screen==='spell')   body = <SpellCircle onLeave={()=>setScreen('base')}/>;
  else if(screen==='grimoire')body = <Grimoire layout={tweaks.grimoireLayout} onLayoutChange={(l)=>setTweak('grimoireLayout',l)} onLeave={()=>setScreen('base')}/>;
  else if(screen==='combat')  body = <Combat onLeave={()=>setScreen('dungeon')}/>;
  else if(screen==='academy') body = <Academy onLeave={()=>setScreen('location')}/>;
  else if(screen==='market')  body = <Market onLeave={()=>setScreen('location')}/>;
  else if(screen==='tavern')  body = <Tavern onLeave={()=>setScreen('location')} party={party} setParty={setParty}/>;
  else if(screen==='dungeon') body = <Dungeon onLeave={()=>setScreen('location')} onCombat={()=>setScreen('combat')}/>;
  else if(screen==='inventory')body = <Inventory onLeave={()=>setScreen('base')}/>;

  return (
    <>
      <div style={{
        position:'fixed', inset:0, display:'flex', flexDirection:'column',
        background: tweaks.night ? 'oklch(0.16 0.03 258)' : 'oklch(0.94 0.022 82)',
        overflow:'hidden',
      }}>
        <MiniAppHeader
          title={title}
          subtitle={subtitle}
          left={screen!=='map' ? <HeaderBack onClick={()=>setScreen('map')}/> : null}
          right={<div style={{display:'flex', alignItems:'center', gap:4}}><HeaderMenu/></div>}
        />
        <div style={{padding:'4px 10px 0', display:'flex', justifyContent:'center', gap:6, flexShrink:0}}>
          <GameTimePill day={gameTime.day} month={gameTime.month} year={gameTime.year} season={gameTime.season} night={tweaks.night}/>
          <Chip color="verdigris">⚡ {backendState?.magic?.mana_available ?? 14} / {backendState?.magic?.mana_max ?? 20}</Chip>
          <Chip color="wax">🜚 {backendState?.magic?.pyra_balance ?? 128}</Chip>
        </div>
        <div style={{flex:1, display:'flex', flexDirection:'column', marginTop:6, minHeight:0}}>
          {body}
        </div>
      </div>
      <VibesParticles count={25}/>
      <VibesOverlays/>
    </>
  );
}
